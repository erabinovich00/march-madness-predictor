<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ "Sign In" if mode == "login" else "Create Account" }} - March Madness 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>MARCH MADNESS 2026</h1>
        <p class="subtitle">Build your bracket. Beat your friends. Trust the algorithm.</p>
    </header>

    <main>
        <section class="auth-card">
            <h2>{{ "Sign In" if mode == "login" else "Create Account" }}</h2>
            <form id="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required
                           minlength="3" maxlength="30" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required
                           minlength="6" autocomplete="{{ 'current-password' if mode == 'login' else 'new-password' }}">
                </div>
                <div id="auth-error" class="error-msg hidden"></div>
                <button type="submit" class="btn-primary auth-submit">
                    {{ "Sign In" if mode == "login" else "Create Account" }}
                </button>
            </form>
            <p class="auth-switch">
                {% if mode == "login" %}
                    Don't have an account? <a href="/register">Create one</a>
                {% else %}
                    Already have an account? <a href="/login">Sign in</a>
                {% endif %}
            </p>
        </section>
    </main>

    <script>
    document.getElementById("auth-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const errorEl = document.getElementById("auth-error");
        errorEl.classList.add("hidden");

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const endpoint = "{{ '/api/login' if mode == 'login' else '/api/register' }}";

        try {
            const res = await fetch(endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password }),
            });
            const data = await res.json();
            if (!res.ok) {
                errorEl.textContent = data.error || "Something went wrong";
                errorEl.classList.remove("hidden");
                return;
            }
            window.location.href = "/";
        } catch (err) {
            errorEl.textContent = "Network error. Please try again.";
            errorEl.classList.remove("hidden");
        }
    });
    </script>
</body>
</html>
